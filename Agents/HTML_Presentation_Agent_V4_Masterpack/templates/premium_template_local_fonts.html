<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Template – Local Fonts</title>
  <style>
    @font-face {
      font-family: "DisplayLocal";
      src: url("../assets/fonts/DisplayLocal.woff2") format("woff2");
      font-weight: 300 800;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "BodyLocal";
      src: url("../assets/fonts/BodyLocal.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "UiLocal";
      src: url("../assets/fonts/UiLocal.woff2") format("woff2");
      font-weight: 300 700;
      font-style: normal;
      font-display: swap;
    }
    :root{
      --bg:#120b0b; --bg2:#1a1010; --ink:#fff0ea; --muted:#d8b8ad;
      --line:rgba(255,255,255,.11); --panel:rgba(255,255,255,.06);
      --font-display:"DisplayLocal","Bricolage Grotesque","Space Grotesk","Sora",sans-serif;
      --font-body:"BodyLocal",Inter,"IBM Plex Sans",system-ui,sans-serif;
      --font-ui:"UiLocal","IBM Plex Mono","Courier New",monospace;
      --accent:#ff7a59; --accent-2:#ffb703;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:var(--font-body)}
    .slide{height:100vh;display:grid;place-items:center;padding:40px}
    .shell{max-width:1120px;padding:38px;border:1px solid var(--line);background:var(--panel);border-radius:24px}
    .eyebrow{font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--accent-2);font-size:12px}
    h1{font-family:var(--font-display);font-size:76px;letter-spacing:-.05em;line-height:1.01;margin:12px 0 18px}
    p{font-family:var(--font-body);font-size:22px;line-height:1.55;color:var(--muted);margin:0;max-width:840px}
  </style>
</head>
<body>
  <section class="slide">
    <div class="shell">
      <div class="eyebrow">Local Fonts • Ember Signal</div>
      <h1>Здесь агент уже умеет подхватывать твои собственные шрифты и собирать более уникальную типографику.</h1>
      <p>Локальные шрифты – лучший способ дать агенту настоящее разнообразие без ощущения шаблонности.</p>
    </div>
  </section>
</body>
</html>
