<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Template – System Safe</title>
  <style>
    :root{
      --bg:#08111d; --bg2:#111827; --ink:#eef4ff; --muted:#b7c4d8;
      --line:rgba(255,255,255,.11); --panel:rgba(255,255,255,.06);
      --font-display:"Space Grotesk","Sora","Avenir Next","SF Pro Display",-apple-system,"Segoe UI",sans-serif;
      --font-body:Inter,"IBM Plex Sans",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      --font-ui:"IBM Plex Mono","SFMono-Regular",Consolas,"Courier New",monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--ink);font-family:var(--font-body)}
    .slide{height:100vh;display:grid;place-items:center;padding:40px}
    .shell{max-width:1120px;padding:38px;border:1px solid var(--line);background:var(--panel);border-radius:24px}
    .eyebrow,.ui{font-family:var(--font-ui);text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-size:12px}
    h1,h2,h3{font-family:var(--font-display);margin:0}
    h1{font-size:72px;letter-spacing:-.04em;line-height:1.02;margin:12px 0 18px}
    p{font-size:22px;line-height:1.55;color:var(--muted);margin:0;max-width:840px}
  </style>
</head>
<body>
  <section class="slide">
    <div class="shell">
      <div class="eyebrow">System Safe • Fonts + Colors</div>
      <h1>Даже автономный HTML может быть не дефолтным, если у него есть display, body и ui слой.</h1>
      <p>Этот шаблон разделяет типографические роли и использует цветовые роли, а не случайные оттенки.</p>
    </div>
  </section>
</body>
</html>
