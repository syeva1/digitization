<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soft Luxury Serif</title>
<style>
:root{
  --bg:#18141a; --bg2:#241d27; --text:#f7f1fa; --muted:#d6c6de; --line:rgba(255,255,255,.10);
  --panel:rgba(255,255,255,.05); --accent:#e9c46a;
  --display:"Georgia","Iowan Old Style","Times New Roman",serif;
  --body:"Helvetica Neue","Avenir Next","Segoe UI",Arial,sans-serif;
  --ui:"IBM Plex Mono",Consolas,monospace;
}
*{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:
radial-gradient(circle at 20% 16%, rgba(233,196,106,.10), transparent 20%),
linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:var(--body)}
.slide{height:100vh;display:grid;place-items:center;padding:48px}
.shell{width:min(1140px,100%);padding:44px;border:1px solid var(--line);background:var(--panel);border-radius:32px}
.kicker{font-family:var(--ui);text-transform:uppercase;letter-spacing:.14em;color:var(--accent);font-size:12px}
h1{font-family:var(--display);font-size:84px;line-height:.98;letter-spacing:-.05em;font-weight:700;margin:14px 0 18px;max-width:930px}
p{max-width:820px;font-size:22px;line-height:1.62;color:var(--muted);margin:0}
em{font-family:var(--display);font-style:italic;color:var(--text)}
</style>
</head>
<body>
<section class="slide">
  <div class="shell">
    <div class="kicker">Example 06 • Soft Luxury Serif</div>
    <h1>Тонкая luxury-подача с классическим serif и спокойным современным body</h1>
    <p>Этот стиль подойдёт для концепт-дек, сторителлинга и более эмоциональных презентаций. Здесь ощущение строится на сочетании <em>сильного контрастного заголовка</em> и мягкого текста без визуального шума.</p>
  </div>
</section>
</body>
</html>
